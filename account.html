<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Account | Sree Veerabhadra Pickles</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .account-page {
      min-height: 80vh;
      padding: 50px 20px;
      background: #fff8eb;
    }

    .account-container {
      max-width: 950px;
      margin: auto;
    }

    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .account-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
    }

    .account-card h2 {
      color: #0d5c35;
      margin-top: 0;
    }

    .profile-row {
      margin: 10px 0;
      word-break: break-word;
    }

    .order-card {
      border: 1px solid #e5dccb;
      border-radius: 12px;
      padding: 18px;
      margin-top: 15px;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-status {
      background: #e6f4ea;
      color: #0d5c35;
      padding: 5px 10px;
      border-radius: 20px;
      font-weight: bold;
    }

    .order-items {
      margin: 12px 0;
      padding-left: 20px;
    }

    .account-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-message {
      text-align: center;
      padding: 25px;
      color: #666;
    }

    @media (max-width: 600px) {
      .account-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="container nav">
    <a class="brand" href="index.html">
      <img src="logo.jpeg" alt="Sree Veerabhadra Pickles logo">
      <div>
        <strong>Sree Veerabhadra</strong>
        <span>Pickles</span>
      </div>
    </a>

    <nav>
      <a href="index.html">Home</a>
      <button id="logoutBtn" type="button">Logout</button>
    </nav>
  </div>
</header>

<main class="account-page">
  <div class="account-container">

    <div class="account-header">
      <div>
        <span class="tag">Customer account</span>
        <h1>My Account</h1>
      </div>

      <a href="index.html#products" class="btn primary">
        Shop Pickles
      </a>
    </div>

    <section class="account-card">
      <h2>Profile</h2>

      <div class="profile-row">
        <strong>Name:</strong>
        <span id="customerName">Loading…</span>
      </div>

      <div class="profile-row">
        <strong>Email:</strong>
        <span id="customerEmail">Loading…</span>
      </div>

      <div class="profile-row">
        <strong>Phone:</strong>
        <span id="customerPhone">Not available</span>
      </div>
    </section>

    <section class="account-card">
      <h2>My Orders</h2>

      <div id="ordersLoading" class="notice">
        Loading your orders…
      </div>

      <div id="ordersList"></div>
    </section>

  </div>
</main>

<footer>
  <div class="container footer">
    <span>© Sree Veerabhadra Pickles</span>
    <a href="index.html">Back to Home</a>
  </div>
</footer>

<script type="module" src="account.js"></script>

</body>
</html>
